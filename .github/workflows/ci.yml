name: ci

on:
  pull_request:
  push:
    branches: [master, main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.19.x"
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: false
      - name: Download Go modules
        run: go mod download
      - name: Verify
        run: make verify
