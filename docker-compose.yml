services:
  mysql:
    image: mysql:8.4
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-local-root-only}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-bp_companion}
      MYSQL_USER: ${MYSQL_USER:-bp_companion}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-bp_companion_local}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-local-root-only}"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - bp-companion-mysql:/var/lib/mysql

volumes:
  bp-companion-mysql:
